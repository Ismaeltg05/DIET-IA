##
# Autor: Ismael Torres González y Francisco J. Salmerón Puig
# Comentador: Ismael Torres González y Francisco J. Salmerón Puig
#
# Configuración Nginx usada como reverse-proxy para enrutar requests HTTP
# a los dos backends: el servicio AI (FastAPI) en el contenedor `backend`
# y la API Node (auth/recipes) en `backend-node`.
#
# Este proxy configura:
# - CORS global para permitir peticiones desde el frontend.
# - Enrutamiento a los backends según el prefijo de ruta.
# - Redirección de la raíz a /docs para exponer la API de FastAPI.
events {
    worker_connections 1024;
}

http {
    # Upstream para el servicio AI en el contenedor `backend`.
    upstream backend_ai {
        server backend:8000;
    }

    # Upstream para la API Node.js de autenticación y recetas.
    upstream backend_node {
        server backend-node:3000;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 50M;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # Proxy para la ruta exacta /api/recipes que apunta al backend Node.js.
        location = /api/recipes {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://backend_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Proxy para todas las rutas bajo /api/recipes/ al backend Node.js.
        location /api/recipes/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://backend_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Proxy principal para las rutas AI que deben llegar al servicio FastAPI.
        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://backend_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Proxy para la ruta de autenticación, gestionada por el backend Node.js.
        location /auth/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://backend_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://backend_ai/api/ai/health;
            proxy_set_header Host $host;
        }

        location /docs {
            proxy_pass http://backend_ai/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_ai/openapi.json;
            proxy_set_header Host $host;
        }

        # Redirige la raíz del dominio a la documentación de FastAPI.
        location / {
            return 301 /docs;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}