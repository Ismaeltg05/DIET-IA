services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Backend
    command: python3 -m uvicorn ai.main:app --host 0.0.0.0 --port 8000
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017/diet-ia
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongo_data: