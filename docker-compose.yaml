# Autor: Ismael Torres González y Francisco J. Salmerón Puig
# Comentador: Ismael Torres González y Francisco J. Salmerón Puig
#
# Este archivo `docker-compose.yaml` orquesta los contenedores necesarios
# para ejecutar la aplicación localmente (base de datos, mensajería, HBase,
# Spark, microservicios Python/Node y proxy Nginx). Las variables y puertos
# reflejan la configuración esperada por los servicios del backend.
##
# Autor: Ismael Torres González y Francisco J. Salmerón Puig
# Comentador: Ismael Torres González y Francisco J. Salmerón Puig
#
# Este archivo `docker-compose.yaml` orquesta los contenedores necesarios
# para ejecutar la aplicación localmente (base de datos, mensajería, HBase,
# Spark, microservicios Python/Node y proxy Nginx). Las variables y puertos
# reflejan la configuración esperada por los servicios del backend.
services:
  # --- DATABASE & STORAGE ---
  mongo:
    image: mongo:7
    container_name: mongo
  # --- DATABASE & STORAGE ---
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diet-ia

  # --- HADOOP ECOSYSTEM ---
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diet-ia

  # --- HADOOP ECOSYSTEM ---
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOO_CFG_SERVER_1: zookeeper=2181
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - diet-ia

  hbase:
    image: harisekhon/hbase:latest
    container_name: hbase
    hostname: hbase
    restart: always
    ports:
      - "16010:16010"   # HBase Master Web UI
      - "9090:9090"     # Thrift Server (CRITICAL - was missing)
      - "16000:16000"   # HBase Master Port
      - "16030:16030"   # Region Server UI
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://localhost:9000/hbase
      HBASE_CONF_hbase_zookeeper_quorum: zookeeper
      HBASE_CONF_hbase_zookeeper_property_clientPort: 2181
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 16010 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      - "16010:16010"   # HBase Master Web UI
      - "9090:9090"     # Thrift Server (CRITICAL - was missing)
      - "16000:16000"   # HBase Master Port
      - "16030:16030"   # Region Server UI
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://localhost:9000/hbase
      HBASE_CONF_hbase_zookeeper_quorum: zookeeper
      HBASE_CONF_hbase_zookeeper_property_clientPort: 2181
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 16010 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - diet-ia
      - diet-ia

  # --- MESSAGING (Kafka) ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
  # --- MESSAGING (Kafka) ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kafka-logs
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - diet-ia
      - diet-ia

  # --- SPARK CLUSTER ---
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
  # --- SPARK CLUSTER ---
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"     # Spark Master Web UI
      - "7077:7077"     # Spark Master Port (for workers)
      - "8080:8080"     # Spark Master Web UI
      - "7077:7077"     # Spark Master Port (for workers)
    environment:
      SPARK_LOCAL_IP: spark-master
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tlnp 2>/dev/null | grep -q 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      SPARK_LOCAL_IP: spark-master
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tlnp 2>/dev/null | grep -q 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - diet-ia

  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
      - diet-ia

  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
    restart: always
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker 
      spark://spark-master:7077 
      -c 2 
      -m 2G
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker 
      spark://spark-master:7077 
      -c 2 
      -m 2G
    ports:
      - "8081:8081"     # Spark Worker Web UI
    depends_on:
      spark-master:
        condition: service_healthy
      - "8081:8081"     # Spark Worker Web UI
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_LOCAL_IP: spark-worker
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8081 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      SPARK_LOCAL_IP: spark-worker
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8081 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - diet-ia

  # --- BACKEND API ---
  backend:
    build:
      context: ./Backend
      dockerfile: ./Dockerfile
    container_name: backend
    restart: always
    command: python3 -m uvicorn ai.main:app --host 0.0.0.0 --port 8000
      - diet-ia

  # --- BACKEND API ---
  backend:
    build:
      context: ./Backend
      dockerfile: ./Dockerfile
    container_name: backend
    restart: always
    command: python3 -m uvicorn ai.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"     # FastAPI Backend (ONLY this, not 3000)
      - "8000:8000"     # FastAPI Backend (ONLY this, not 3000)
    environment:
      # Database
      MONGO_URI: mongodb://mongo:27017/diet-ia
      
      # Messaging
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      
      # HBase
      HBASE_HOST: hbase
      HBASE_PORT: "9090"
      
      # Spark
      SPARK_MASTER: spark://spark-master:7077
      
      # Logging
      LOG_LEVEL: INFO
      
      # Python
      PYTHONUNBUFFERED: "1"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    volumes:
      - ./Backend:/app              # Mount Backend directory to app root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ai/health"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
      # Database
      MONGO_URI: mongodb://mongo:27017/diet-ia
      
      # Messaging
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      
      # HBase
      HBASE_HOST: hbase
      HBASE_PORT: "9090"
      
      # Spark
      SPARK_MASTER: spark://spark-master:7077
      
      # Logging
      LOG_LEVEL: INFO
      
      # Python
      PYTHONUNBUFFERED: "1"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hbase:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    volumes:
      - ./Backend:/app              # Mount Backend directory to app root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ai/health"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - diet-ia
      - diet-ia

  # --- NODE API (Auth & Recipes) ---
  backend-node:
    image: node:20-alpine
    container_name: backend-node
    restart: always
    working_dir: /app
    command: sh -c "npm ci --omit=dev && npm start"
  # --- NODE API (Auth & Recipes) ---
  backend-node:
    image: node:20-alpine
    container_name: backend-node
    restart: always
    working_dir: /app
    command: sh -c "npm ci --omit=dev && npm start"
    environment:
      PORT: "3000"
      MONGO_URI: mongodb://mongo:27017/diet-ia
      NODE_ENV: production
      PORT: "3000"
      MONGO_URI: mongodb://mongo:27017/diet-ia
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./Backend:/app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
      mongo:
        condition: service_healthy
    volumes:
      - ./Backend:/app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - diet-ia

  # --- REVERSE PROXY  ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"         # Allow browser requests to http://localhost/api/*
      - "3000:80"       # Public port 3000 -> internal routing
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      backend-node:
        condition: service_healthy
    networks:
      - diet-ia
      - diet-ia

  # --- REVERSE PROXY  ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"         # Allow browser requests to http://localhost/api/*
      - "3000:80"       # Public port 3000 -> internal routing
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      backend-node:
        condition: service_healthy
    networks:
      - diet-ia

volumes:
  mongo_data:
  kafka_data:

networks:
  diet-ia:
    driver: bridge