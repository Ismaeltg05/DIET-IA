version: '3.8'

services:
  # -------------------------------------------------------
  # 1. CORE: ZOOKEEPER & KAFKA (Ingesta de Datos)
  # -------------------------------------------------------
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - smart-taxi-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Permite conexión desde fuera (localhost) y dentro de la red docker
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - smart-taxi-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # -------------------------------------------------------
  # 2. ALMACENAMIENTO: HDFS (Hadoop Distributed File System)
  # -------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870" # Interfaz Web HDFS (Ver archivos en navegador)
      - "9000:9000" # Puerto IPC para conexión
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    networks:
      - smart-taxi-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    networks:
      - smart-taxi-net

  # -------------------------------------------------------
  # 3. PROCESAMIENTO: SPARK (Master & Worker)
  # -------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080" # Spark Web UI (Dashboard)
      - "7077:7077" # Master Port
    networks:
      - smart-taxi-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    networks:
      - smart-taxi-net

  # -------------------------------------------------------
  # 4. BASE DE DATOS NOSQL: MONGODB
  # -------------------------------------------------------
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=smart_taxi
    networks:
      - smart-taxi-net

# Red personalizada para que todos se vean por nombre
networks:
  smart-taxi-net:
    driver: bridge
