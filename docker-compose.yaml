version: '3.8'

services:
  # -------------------------------------------------------
  # 1. BASE DE DATOS: MONGODB (Recetas, Perfiles DIET-IA y Logs)
  # -------------------------------------------------------
  diet-ia-db:
    image: mongo:latest
    container_name: diet-ia-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=diet_ia_db
    networks:
      - diet-ia-net
    volumes:
      - mongo_data:/data/db

  # -------------------------------------------------------
  # 2. PROCESAMIENTO BIG DATA: SPARK (Master & Worker)
  # -------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5
    container_name: diet-ia-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8080:8080" # Spark Web UI
      - "7077:7077" # Puerto interno de comunicación
    networks:
      - diet-ia-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: diet-ia-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - diet-ia-net

  # -------------------------------------------------------
  # 3. AUTOMATIZACIÓN ETL: n8n (Ingesta de BEDCA / Edamam)
  # -------------------------------------------------------
  diet-ia-etl:
    image: n8nio/n8n:latest
    container_name: diet-ia-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - NODE_ENV=production
    networks:
      - diet-ia-net
    volumes:
      - n8n_data:/home/node/.n8n

  # -------------------------------------------------------
  # 4. BACKEND: FastAPI (IA de DIET-IA y Recomendador)
  # -------------------------------------------------------
  diet-ia-api:
    build: 
      context: ./backend # Directorio donde estará vuestro código y Dockerfile
    container_name: diet-ia-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://diet-ia-db:27017/diet_ia_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - diet-ia-db
    networks:
      - diet-ia-net

  # -------------------------------------------------------
  # 5. ALMACENAMIENTO: HDFS (Opcional para Datasets crudos)
  # -------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: diet-ia-namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=diet_ia_cluster
    networks:
      - diet-ia-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: diet-ia-datanode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode
    networks:
      - diet-ia-net

# Red y volúmenes persistentes
networks:
  diet-ia-net:
    driver: bridge

volumes:
  mongo_data:
  n8n_data:
